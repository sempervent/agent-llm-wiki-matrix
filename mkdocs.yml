    - "Campaign walkthrough (committed trees)": workflows/campaign-walkthrough.md
    - "Reporting pipeline (matrices, alwm report)": workflows/reporting.md
    - "Verification (CI, drift sweep, alwm validate)": workflows/verification.md
    - "Longitudinal & regression reporting": workflows/longitudinal-reporting.md
    - "Evidence audit (v0.2.4 publication gaps)": audits/v0.2.4-publication-workflow-audit.md
