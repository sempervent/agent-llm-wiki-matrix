# MkDocs — navigable documentation site (source files remain markdown-first under docs/).
# Local: `just docs` · Build: `just docs-build` · CI: .github/workflows/docs.yml

site_name: agent-llm-wiki-matrix
site_description: Markdown-first LLM wiki, comparison matrices, benchmarks, and campaign publication tooling
site_author: Joshua Grant

repo_url: https://github.com/sempervent/agent-llm-wiki-matrix
edit_uri: edit/main/docs/

# Project site base URL (GitHub Pages). Required for correct links and assets when not served from domain root.
site_url: https://sempervent.github.io/agent-llm-wiki-matrix/

docs_dir: docs
site_dir: site

strict: true

# Repo markdown often links to ../../README.md, ../../examples/, ../../tests/ (valid on GitHub; not bundled under docs/).
validation:
  links:
    not_found: ignore
  not_found: warn

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

# Nav: "Publication & reports (v0.2.5)" = E2E checklist, merge-order tracking, CLI/compare, reporting, verification, examples index.
# Roadmap v0.2.5 theme stays under "Roadmap & milestones" only (avoid duplicate sidebar entries).
