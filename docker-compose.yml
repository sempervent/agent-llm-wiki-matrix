# Docker Compose orchestration for local development, tests, and benchmarks.
# Profiles isolate use cases; see docs/workflows/local-dev.md.

x-alwm-env: &alwm-env
  env_file:
    - path: .env
      required: false
  environment:
    ALWM_LOG_LEVEL: ${ALWM_LOG_LEVEL:-INFO}
    ALWM_FIXTURE_MODE: ${ALWM_FIXTURE_MODE:-0}
    ALWM_REPO_ROOT: /workspace
  working_dir: /workspace
  volumes:
    - ${PWD:-.}:/workspace:rw

services:
  orchestrator:
    <<: *alwm-env
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: agent-llm-wiki-matrix:local
    profiles:
      - dev
    command: ["--help"]

  tests:
    <<: *alwm-env
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    image: agent-llm-wiki-matrix:test
    profiles:
      - test

  benchmark:
    <<: *alwm-env
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: agent-llm-wiki-matrix:local
    profiles:
      - benchmark
    command: ["info"]

  # Optional: bundle Ollama when model profiles are hardened (see docs/workflows/benchmarking.md).
