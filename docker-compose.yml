# Docker Compose orchestration for local development, tests, and benchmarks.
# Profiles isolate use cases; see docs/workflows/local-dev.md.

x-alwm-env: &alwm-env
  env_file:
    - path: .env
      required: false
  environment:
    ALWM_LOG_LEVEL: ${ALWM_LOG_LEVEL:-INFO}
    ALWM_FIXTURE_MODE: ${ALWM_FIXTURE_MODE:-0}
    ALWM_REPO_ROOT: /workspace
  working_dir: /workspace
  volumes:
    - ${PWD:-.}:/workspace:rw

services:
  orchestrator:
    <<: *alwm-env
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: agent-llm-wiki-matrix:local
    profiles:
      - dev
    command: ["--help"]

  tests:
    <<: *alwm-env
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    image: agent-llm-wiki-matrix:test
    profiles:
      - test

  benchmark:
    <<: *alwm-env
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: agent-llm-wiki-matrix:local
    profiles:
      - benchmark
    command: ["info"]

  benchmark-offline:
    <<: *alwm-env
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: agent-llm-wiki-matrix:local
    profiles:
      - benchmark-offline
    environment:
      ALWM_LOG_LEVEL: ${ALWM_LOG_LEVEL:-INFO}
      ALWM_FIXTURE_MODE: "1"
      ALWM_REPO_ROOT: /workspace
    command:
      - benchmark
      - run
      - --definition
      - /workspace/fixtures/benchmarks/offline.v1.yaml
      - --output-dir
      - /workspace/out/benchmark-offline
      - --created-at
      - "1970-01-01T00:00:00Z"
      - --run-id
      - compose-benchmark-offline

  ollama:
    image: ollama/ollama:latest
    profiles:
      - benchmark-ollama
      - benchmark-probe
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # ollama image has the `ollama` CLI; HTTP tools may be absent.
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 15s
      retries: 18
      start_period: 30s

  benchmark-ollama:
    <<: *alwm-env
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: agent-llm-wiki-matrix:local
    profiles:
      - benchmark-ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      ALWM_LOG_LEVEL: ${ALWM_LOG_LEVEL:-INFO}
      ALWM_FIXTURE_MODE: "0"
      ALWM_REPO_ROOT: /workspace
      OLLAMA_HOST: http://ollama:11434
    command:
      - benchmark
      - run
      - --definition
      - /workspace/benchmarks/v1/ollama.v1.yaml
      - --output-dir
      - /workspace/out/benchmark-ollama
      - --no-fixture-mock
      - --run-id
      - compose-benchmark-ollama

  # Live API smoke: GET /api/tags (Ollama) + GET /v1/models (OpenAI-compatible on host).
  benchmark-probe:
    <<: *alwm-env
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: agent-llm-wiki-matrix:local
    profiles:
      - benchmark-probe
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      ALWM_LOG_LEVEL: ${ALWM_LOG_LEVEL:-INFO}
      ALWM_FIXTURE_MODE: "0"
      ALWM_REPO_ROOT: /workspace
      OLLAMA_HOST: http://ollama:11434
      OPENAI_BASE_URL: ${LLAMACPP_OPENAI_BASE_URL:-http://host.docker.internal:8080/v1}
    command: [benchmark, probe]

  benchmark-llamacpp:
    <<: *alwm-env
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: agent-llm-wiki-matrix:local
    profiles:
      - benchmark-llamacpp
    environment:
      ALWM_LOG_LEVEL: ${ALWM_LOG_LEVEL:-INFO}
      ALWM_FIXTURE_MODE: "0"
      ALWM_REPO_ROOT: /workspace
      OPENAI_BASE_URL: ${LLAMACPP_OPENAI_BASE_URL:-http://host.docker.internal:8080/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-not-needed-local}
    command:
      - benchmark
      - run
      - --definition
      - /workspace/benchmarks/v1/llamacpp.v1.yaml
      - --output-dir
      - /workspace/out/benchmark-llamacpp
      - --no-fixture-mock
      - --run-id
      - compose-benchmark-llamacpp

  # Playwright smoke (headless Chromium; optional image target `browser-test` in Dockerfile).
  browser-verify:
    <<: *alwm-env
    build:
      context: .
      dockerfile: Dockerfile
      target: browser-test
    image: agent-llm-wiki-matrix:browser-test
    profiles:
      - browser-verify
    environment:
      ALWM_LOG_LEVEL: ${ALWM_LOG_LEVEL:-INFO}
      ALWM_REPO_ROOT: /workspace
      ALWM_PLAYWRIGHT_SMOKE: "1"
    command:
      - python
      - -m
      - pytest
      - tests/integration/test_playwright_browser.py
      - -v
      - --strict-markers

volumes:
  ollama_models:
