# Agentic pack — checkout browser evidence (multi-screenshot + structured extensions).
schema_version: 1
id: bench.agentic.pack.browser_checkout.v1
title: Agentic pack — browser checkout interpretation
rubric_ref: examples/dataset/rubrics/browser_realism.v1.json
taxonomy:
  taxonomy_version: 1
  task_family: browser_evidence
  difficulty: medium
  determinism: deterministic_fixture
  tool_requirements: [browser_mock, registry, cli]
time_budget_seconds: 200
token_budget: 2600
retry_policy:
  max_attempts: 2
  backoff_seconds: 1.5
tags: [agentic_pack, cross_system, browser_checkout]
expected_artifact_kinds:
  - benchmark_request
  - benchmark_response
  - evaluation
  - browser_evidence
  - report
success_criteria:
  - References URLs and excerpt labels grounded in the fixture JSON.
  - Separates fixture metadata from inferred shopper intent.
  - Notes at least one limitation of offline traces versus live Playwright (optional extra).
failure_taxonomy_hints:
  - evidence_overclaim
  - ignores_screenshot_scope
  - ignores_network_summary
prompts:
  - id: p-checkout
    prompt_ref: bench.task.browser_evidence.v1
variants:
  - id: v-checkout
    agent_stack: browser-mock
    execution_mode: browser_mock
    backend:
      kind: mock
      model: mock-model
    browser:
      runner: file
      fixture_relpath: fixtures/browser_evidence/v1/checkout_flow.json
